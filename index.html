<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h3>Your Location</h3>
        <div id="location-info" class="location-info">Detecting...</div>
        <button id="locate" class="locate-btn">🔄 Refresh Location</button>
    </div>
    <div class="container">
        <h1>Weather</h1>
        <div class="search">
            <input type="text" id="city" placeholder="City name (e.g., Tokyo, Москва, 北京)" autofocus>
            <button id="search">Get Weather</button>
        </div>
        <div class="date-picker">
            <input type="date" id="date" />
        </div>
        <div id="map" class="map-container"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></scriptdiv id="weather" class="weather"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
